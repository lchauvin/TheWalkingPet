name: mobile
description: "TheWalkingPet - Find lost pets"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # State management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Image picking
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Open maps
  url_launcher: ^6.3.1

  # Image caching
  cached_network_image: ^3.4.1

  # Google Sign In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FF5722"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#FF5722"
  image: assets/splash.png
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png
